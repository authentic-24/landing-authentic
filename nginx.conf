server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # Sirve archivos grandes directamente desde disco sin bufferizar en memoria
    sendfile        on;
    sendfile_max_chunk 2m;
    tcp_nopush      on;
    tcp_nodelay     on;

    # Tiempo suficiente para transferir archivos grandes (videos)
    send_timeout    300s;
    keepalive_timeout 65s;

    location ~* \.(mp4|webm)$ {
        try_files $uri =404;
        add_header Accept-Ranges bytes;
        add_header Cache-Control "public, max-age=604800";
        add_header X-Content-Type-Options nosniff;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
